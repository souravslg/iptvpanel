name: Update JioStar Playlist

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Jio and Hotstar Updates
        run: |
          python <<EOF
          import requests
          import re
          import os
          import sys
          import datetime

          m3u_file = "jtv.m3u"
          jio_worker = "https://zstar.pfy.workers.dev/"
          hotstar_worker = "https://voot.vodep39240327.workers.dev?voot.m3u"

          try:
              # 1. Fetch Jio Cookie
              jio_res = requests.get(jio_worker, timeout=15)
              jio_match = re.search(r'__hdnea__=([^"\'\s&]+)', jio_res.text)
              jio_token = f"__hdnea__={jio_match.group(1)}" if jio_match else None
                            
              # 2. Fetch Hotstar Data
              hs_res = requests.get(hotstar_worker, timeout=20)
              hs_match = re.search(r'hdntl=exp=[^&"\'\s]+', hs_res.text)
              hs_token = hs_match.group(0) if hs_match else None

              if not os.path.exists(m3u_file):
                  print(f"Error: {m3u_file} not found")
                  sys.exit(1)

              with open(m3u_file, 'r', encoding='utf-8') as f:
                  lines = f.readlines()

              updated_lines = []
              jio_count = 0
              current_time = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC")

              for line in lines:
                  stripped = line.strip()
                  
                  if not stripped:
                      updated_lines.append(line)
                      continue
                      
                  if stripped.startswith("# Last Updated:"):
                      continue
                                    
                  # --- HANDLE HOTSTAR LINES ---
                  if "#EXTHTTP" in stripped and "hdntl" in stripped and hs_token:
                      updated_line = re.sub(r'hdntl=exp=[^"}]+', hs_token, stripped)
                      updated_lines.append(updated_line + "\n")
                                    
                  elif "hotstar.com" in stripped and hs_token:
                      clean_link = stripped.split('|')[0] 
                      updated_line = re.sub(r'hdntl=exp=[^&|]+', hs_token, clean_link)
                      updated_lines.append(updated_line + "|User-Agent=ExoPlayer\n")

                  # --- HANDLE JIO LINES ---
                  elif "#EXTHTTP" in stripped and "__hdnea__" in stripped and jio_token:
                      updated_line = re.sub(r'__hdnea__=[^"}]+', jio_token, stripped)
                      updated_lines.append(updated_line + "\n")
                      
                  elif "jiotvbpkmob.cdn.jio.com" in stripped:
                      # Clean URL
                      clean_link = re.sub(r'([?&])__hdnea__=[^&|]*', '', stripped)
                      clean_link = clean_link.split('|')[0] 
                      clean_link = re.sub(r'&xxx=$', '', clean_link)
                      
                      jio_count += 1
                      
                      # Apply Working URL Token Format + TiviMate User-Agent Pipe
                      if jio_token:
                          separator = '&' if '?' in clean_link else '?'
                          updated_lines.append(f"{clean_link}{separator}{jio_token}&xxx=|User-Agent=plaYercore/2.9.3\n")
                      else:
                          updated_lines.append(f"{clean_link}|User-Agent=plaYercore/2.9.3\n")
                      
                  # --- EVERYTHING ELSE ---
                  else:
                      updated_lines.append(line)

              # Forced timestamp
              if updated_lines and updated_lines[0].startswith("#EXTM3U"):
                  updated_lines.insert(1, f"# Last Updated: {current_time}\n")

              with open(m3u_file, 'w', encoding='utf-8') as f:
                  f.writelines(updated_lines)
                            
              print(f"Successfully processed jtv.m3u.")
              print(f"Updated {jio_count} Jio channel links.")

          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jtv.m3u
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "Automated update: Added Token URL + UA Pipe for TiviMate"
          git push
