name: Update JioStar Playlist

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Jio and Hotstar Updates
        run: |
          python <<EOF
          import requests
          import re
          import os
          import sys
          import datetime

          m3u_file = "jtv.m3u"
          jio_worker = "https://zstar.pfy.workers.dev/"
          hotstar_worker = "https://voot.vodep39240327.workers.dev?voot.m3u"

          try:
              current_time = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC")
              
              # ==========================================
              # PART 1: UPDATE STATIC JIO FILE (jtv.m3u)
              # ==========================================
              jio_res = requests.get(jio_worker, timeout=15)
              jio_match = re.search(r'__hdnea__=([^"\'\s&]+)', jio_res.text)
              jio_token = f"__hdnea__={jio_match.group(1)}" if jio_match else None
              
              if os.path.exists(m3u_file):
                  with open(m3u_file, 'r', encoding='utf-8') as f:
                      lines = f.readlines()

                  updated_lines = []
                  for line in lines:
                      stripped = line.strip()
                      if not stripped or stripped.startswith("# Last Updated:"):
                          continue
                      
                      if stripped.startswith("#KODIPROP:inputstream.adaptive.license_key="):
                          drm_match = re.search(r'license_key=([a-fA-F0-9]{32}):([a-fA-F0-9]{32})', stripped)
                          if drm_match:
                              updated_lines.append(f"#KODIPROP:inputstream.adaptive.license_key=https://aqfadtv.xyz/clearkey/results.php?keyid={drm_match.group(1)}&key={drm_match.group(2)}\n")
                          else:
                              updated_lines.append(line)
                      
                      elif stripped.startswith("#EXTVLCOPT:http-user-agent="):
                          updated_lines.append("#EXTVLCOPT:http-user-agent=plaYercore/2.9.3\n")
                          
                      elif stripped.startswith("http") and "jio.com" in stripped:
                          clean_link = re.sub(r'([?&])__hdnea__=[^&|]*', '', stripped)
                          clean_link = clean_link.split('|')[0] 
                          clean_link = re.sub(r'&xxx=$', '', clean_link)
                          if jio_token:
                              separator = '&' if '?' in clean_link else '?'
                              updated_lines.append(f"{clean_link}{separator}{jio_token}&xxx=\n")
                          else:
                              updated_lines.append(clean_link + "\n")
                      else:
                          updated_lines.append(line)

                  if updated_lines and updated_lines[0].startswith("#EXTM3U"):
                      updated_lines.insert(1, f"# Last Updated: {current_time}\n")

                  with open(m3u_file, 'w', encoding='utf-8') as f:
                      f.writelines(updated_lines)
                      
              # ==========================================
              # PART 2: GENERATE HOTSTAR FILE (hotstar.m3u)
              # ==========================================
              hs_res = requests.get(hotstar_worker, timeout=20)
              hs_lines = hs_res.text.splitlines()
              hs_updated = ["#EXTM3U\n", f"# Last Updated: {current_time}\n"]
              
              current_hs_cookie = ""
              current_hs_ua = ""
              
              for line in hs_lines:
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#EXTM3U"):
                      continue
                      
                  # Keep DRM Keys exactly as generated by the worker
                  if stripped.startswith("#KODIPROP:"):
                      hs_updated.append(line + "\n")
                          
                  # Extract User-Agent so we can pipe it for TiviMate
                  elif stripped.startswith("#EXTVLCOPT:http-user-agent="):
                      current_hs_ua = stripped.replace("#EXTVLCOPT:http-user-agent=", "").strip()
                          
                  # Extract Cookie from #EXTHTTP so we can pipe it for TiviMate
                  elif stripped.startswith("#EXTHTTP"):
                      cookie_match = re.search(r'"cookie"\s*:\s*"([^"]+)"', stripped)
                      if cookie_match:
                          current_hs_cookie = cookie_match.group(1)
                      
                  # Format the final Stream URL with TiviMate Pipes
                  elif stripped.startswith("http"):
                      clean_link = stripped.split('|')[0]
                      pipe_params = []
                      
                      if current_hs_cookie:
                          pipe_params.append(f"Cookie={current_hs_cookie}")
                      if current_hs_ua:
                          pipe_params.append(f"User-Agent={current_hs_ua}")
                      else:
                          pipe_params.append("User-Agent=ExoPlayer") # Safe fallback
                          
                      if pipe_params:
                          hs_updated.append(f"{clean_link}|{'&'.join(pipe_params)}\n")
                      else:
                          hs_updated.append(clean_link + "\n")
                          
                      # Reset variables for the next channel
                      current_hs_cookie = ""
                      current_hs_ua = ""
                          
                  else:
                      hs_updated.append(line + "\n")
                      
              with open("hotstar.m3u", "w", encoding="utf-8") as f:
                  f.writelines(hs_updated)

          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jtv.m3u hotstar.m3u
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "Automated update: Translated Hotstar headers to TiviMate pipes"
          git push
